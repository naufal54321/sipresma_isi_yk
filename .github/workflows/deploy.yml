name: CI PRATAMA

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Validasi composer.json
        run: composer validate --no-check-all

      - name: Install dependencies
        run: composer install --no-dev --no-interaction

      - name: Cek syntax PHP
        run: php -l app/Http/Controllers/*.php app/Services/*.php app/Models/*.php

      - name: ✅ CI selesai — Push berhasil
        run: echo "Branch main berhasil diupdate. Kode siap di-deploy manual via deploy.sh"
