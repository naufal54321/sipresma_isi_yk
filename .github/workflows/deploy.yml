name: Deploy PRATAMA

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json
        run: composer validate --no-check-all

      - name: Deploy ke VPS via SSH
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /home/pratama
            git reset --hard HEAD
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction
            npm ci --no-audit --no-fund
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan storage:link --force
            sudo systemctl reload php8.3-fpm
            echo "✅ Deploy sukses: $(date)"

      - name: Skip deploy (VPS belum dikonfigurasi)
        if: ${{ secrets.VPS_HOST == '' }}
        run: |
          echo "⚠️  VPS_HOST belum di-set. Deploy ke VPS dilewati."
          echo "   Untuk mengaktifkan auto deploy, set secrets berikut di GitHub:"
          echo "   - VPS_HOST (IP server)"
          echo "   - VPS_USER (ssh username)"
          echo "   - VPS_SSH_KEY (private key)"
          echo "✅ CI validation sukses!"
